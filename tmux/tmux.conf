set -g mouse on
set -g history-limit 50000
set -g default-terminal "tmux-256color"
set -g terminal-overrides "xterm-256color:Tc"

set -g status-interval 5
set -g status-position top
set -g status-left-length 60
set -g status-right-length 80
set -g status-left '#[bold]#{?@pr_tmux_label,#{@pr_tmux_label},#S} #[dim]#H '
set -g status-right '#[dim]%Y-%m-%d %H:%M'
set -g window-status-format ' #I:#W#{?window_flags,#{window_flags},} '
set -g window-status-current-format '#[reverse] #I:#W#{?window_flags,#{window_flags},} '
set -g window-status-activity-style 'fg=yellow'
set -g window-status-bell-style 'fg=red,bold'
set -g visual-activity on
set -w -g monitor-activity on
set -g set-titles off
setw -g automatic-rename off
setw -g mode-keys vi

bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @resurrect-dir '~/.tmux/resurrect'
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'

run '~/.tmux/plugins/tpm/tpm'
